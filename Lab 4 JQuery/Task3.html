<!DOCTYPE html>
<html>
<head>
<title>Form Validation</title>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
body {
    font-family: 'Segoe UI';
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.form-box {
    background:white;
    padding:30px;
    border-radius:12px;
    width:350px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.input-group {
    margin-bottom:15px;
}

input {
    width:100%;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
    transition:0.3s;
}

input.error {
    border:2px solid #ff4d4d;
    background:#ffe6e6;
}

.error-text {
    color:#ff1a1a;
    font-size:13px;
    margin-top:4px;
    display:none;
}

button {
    width:100%;
    padding:10px;
    background:#ff758c;
    border:none;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

.success {
    color:green;
    margin-top:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="form-box">
<h2>Register</h2>

<form id="myForm">

<div class="input-group">
<input type="text" id="name" placeholder="Full Name">
<div class="error-text" id="nameError">Name is required</div>
</div>

<div class="input-group">
<input type="email" id="email" placeholder="Email">
<div class="error-text" id="emailError">Enter a valid email</div>
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Password">
<div class="error-text" id="passError">
Password must be at least 5 characters and contain 1 number
</div>
</div>

<button type="submit">Submit</button>
</form>

<p id="msg"></p>
</div>

<script>
$(function(){

function validateName(){
    if($("#name").val().trim()===""){
        $("#name").addClass("error");
        $("#nameError").slideDown();
        return false;
    } else {
        $("#name").removeClass("error");
        $("#nameError").slideUp();
        return true;
    }
}

function validateEmail(){
    let emailPattern=/^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    let emailVal=$("#email").val();

    if(emailVal.trim()==="" || !emailPattern.test(emailVal)){
        $("#email").addClass("error");
        $("#emailError").slideDown();
        return false;
    } else {
        $("#email").removeClass("error");
        $("#emailError").slideUp();
        return true;
    }
}

function validatePassword(){
    let password=$("#password").val();
    let passPattern=/^(?=.*\d)[A-Za-z\d]{5,}$/;
    // At least 5 characters & 1 number

    if(!passPattern.test(password)){
        $("#password").addClass("error");
        $("#passError").slideDown();
        return false;
    } else {
        $("#password").removeClass("error");
        $("#passError").slideUp();
        return true;
    }
}

$("#name").blur(validateName);
$("#email").blur(validateEmail);
$("#password").blur(validatePassword);

$("#myForm").submit(function(e){
    e.preventDefault();

    let n=validateName();
    let e1=validateEmail();
    let p=validatePassword();

    if(n && e1 && p){
        $("#msg").text("✅ Successfully Submitted!")
                 .addClass("success");
        $("input").val("");
    }
});

});
</script>

</body>
</html>
