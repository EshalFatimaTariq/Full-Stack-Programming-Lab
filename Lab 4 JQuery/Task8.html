<!DOCTYPE html>
<html>
<head>
<title>Professional Quiz Game</title>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#2c3e50,#4ca1af);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.quiz-box {
    background: #ffffff;
    width: 550px;
    padding: 35px;
    border-radius: 12px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.25);
}

#question {
    font-size: 20px;
    margin-bottom: 20px;
    color: #2c3e50;
}

.option {
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    background: #ecf0f1;
    cursor: pointer;
    transition: 0.3s;
    border: 1px solid transparent;
}

.option:hover {
    background: #dcdde1;
}

.option.correct {
    background: #2ecc71;
    color: white;
}

.option.wrong {
    background: #e74c3c;
    color: white;
}

.option.disabled {
    pointer-events: none;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    background: #2980b9;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #1f6391;
}

#result {
    font-size: 18px;
    font-weight: bold;
    margin-top: 20px;
    display: none;
}
</style>
</head>

<body>

<div class="quiz-box">
    <div id="question"></div>
    <div id="options"></div>
    <button id="nextBtn">Next</button>
    <div id="result"></div>
</div>

<script>
$(function(){

let quiz = [
    {
        question: "Which language is used for web styling?",
        options: ["HTML", "CSS", "Python", "C++"],
        answer: 1
    },
    {
        question: "Which library is used for DOM manipulation?",
        options: ["React", "jQuery", "Laravel", "Django"],
        answer: 1
    },
    {
        question: "Which method is used to fetch API data?",
        options: ["fadeIn()", "css()", "ajax()", "hide()"],
        answer: 2
    }
];

let current = 0;
let score = 0;
let answered = false;

function loadQuestion(){

    answered = false;

    $("#question").hide().text(quiz[current].question).fadeIn(300);

    $("#options").empty();

    $.each(quiz[current].options, function(index, option){
        $("#options").append(
            `<div class="option" data-index="${index}">
                ${option}
            </div>`
        );
    });
}

$(document).on("click", ".option", function(){

    if(answered) return;

    answered = true;

    let selected = $(this).data("index");
    let correctIndex = quiz[current].answer;

    $(".option").addClass("disabled");

    if(selected == correctIndex){
        $(this).addClass("correct");
        score++;
    } else {
        $(this).addClass("wrong");
        $(".option").eq(correctIndex).addClass("correct");
    }
});

$("#nextBtn").click(function(){

    if(!answered){
        alert("Please select an answer before continuing.");
        return;
    }

    current++;

    if(current < quiz.length){
        loadQuestion();
    } else {
        $("#question, #options, #nextBtn").hide();
        $("#result")
            .text("Quiz Completed. Your Score: " + score + " / " + quiz.length)
            .fadeIn(400);
    }
});

loadQuestion();

});
</script>

</body>
</html>
