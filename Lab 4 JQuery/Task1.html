<!DOCTYPE html>
<html>
<head>
<title>Dynamic List Manager</title>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 30px;
    width: 400px;
    border-radius: 12px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.2);
}

h2 { text-align: center; }

input {
    width: 70%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

#addBtn {
    padding: 10px 15px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

ul {
    list-style: none;
    padding: 0;
    margin-top: 20px;
}

li {
    background: #f4f6ff;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
    transition: 0.3s;
}

li:hover {
    background: #dfe4ff;
    transform: scale(1.02);
}

.deleteBtn {
    background: #ff6b6b;
    border: none;
    color: white;
    padding: 5px 8px;
    border-radius: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
<h2>My Task List</h2>

<input type="text" id="itemInput" placeholder="Add new task">
<button id="addBtn">Add</button>

<ul id="itemList"></ul>
</div>

<script>
$(function(){

$("#addBtn").click(function(){
    let text = $("#itemInput").val();
    if(text !== ""){
        $("#itemList").append(
            `<li>${text} <button class='deleteBtn'>Delete</button></li>`
        ).hide().fadeIn(300);
        $("#itemInput").val("");
    }
});

$("#itemList").on("click",".deleteBtn",function(){
    $(this).parent().fadeOut(300,function(){
        $(this).remove();
    });
});

});
</script>

</body>
</html>
